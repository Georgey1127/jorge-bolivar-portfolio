<article class="project-card">
  <div class="project-card__content">
    <p class="project-card__label">Featured Project</p>

    <h2>{{ project.title }}</h2>

    <p class="project-card__description">
      {{ project.shortDescription }}
    </p>

    <div class="project-card__tags">
      @for (technology of project.technologies; track technology) {
        <span>{{ technology }}</span>
      }
    </div>
  </div>

  <div class="project-card__actions">
    <a [routerLink]="['/projects', project.id]" class="project-card__link">
      View Details
    </a>

    @if (project.githubUrl) {
      <a [href]="project.githubUrl" target="_blank" class="project-card__link">
        GitHub
      </a>
    }

    @if (project.liveUrl) {
      <a [href]="project.liveUrl" target="_blank" class="project-card__link">
        Live Demo
      </a>
    }
  </div>
</article>
