<section class="page-section">
  <div class="container">
    <app-section-title
      eyebrow="Projects"
      title="Selected software projects"
      description="A collection of projects that show my experience with software development, data processing, web applications, testing, documentation, and team based engineering work."
    ></app-section-title>

    <div class="projects-grid">
      @for (project of projects; track project.id) {
        <app-project-card [project]="project"></app-project-card>
      }
    </div>
  </div>
</section>
